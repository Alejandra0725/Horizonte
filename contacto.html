<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Contacto</title>
    <link rel="icon" href="images/favicon-emoji.png" type="image/png">
    <link rel="stylesheet" href="main.css"> <!-- Este es el CSS original -->
    <link rel="stylesheet" href="contacto.css"> <!-- Nuevo CSS para contacto -->
    <!-- GOOGLE FONTs -->
    <link href="https://fonts.googleapis.com/css?family=Quicksand" rel="stylesheet">
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous">
    <!-- ANIMATE CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.0/animate.min.css">
</head>
<body>
    

<div class="content">
    <h1 class="logo">Contáctenos</h1>
    <div class="contact-wrapper animated bounceInUp">
        <div class="contact-form">
            <form action="">
                <p>
                    <label>Nombre completo</label>
                    <input type="text" name="fullname">
                </p>
                <p>
                    <label>Correo</label>
                    <input type="email" name="email">
                </p>
                <p>
                    <label>Teléfono</label>
                    <input type="tel" name="phone">
                </p>
                <p>
                    <label>Dirección</label>
                    <input type="text" name="affair">
                </p>
                <p class="block">
                    <label>Mensaje</label>
                    <textarea name="message" rows="3"></textarea>
                </p>
                <p class="block">
                    <button>
                        Enviar
                    </button>
                </p>
            </form>
        </div>
        <div class="contact-info">
            <h4>Más Información</h4>
            <ul>
                <li><i class="fas fa-map-marker-alt"></i> Caracas, Venezuela </li>
                <li><i class="fas fa-phone"></i> +58 412 123 4567</li>
                <li><i class="fas fa-envelope-open-text"></i> contacto@Horizonte.com</li>
            </ul>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Libero provident ipsam necessitatibus repellendus?</p>
            <p>Horizonte.com</p>
        </div>
    </div>
</div>



<a href="index.html" class="back-button">Inicio</a>
<script src="app.js"></script>
</body>
</html>
